name: medi-connect

services:
  # PostgreSQL Database - Primary data store
  postgres:
    image: postgres:15-alpine
    container_name: mediconnect-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mediconnect}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/db/keys_migration.sql:/docker-entrypoint-initdb.d/02-keys.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mediconnect-network
    restart: unless-stopped

  # Redis Cache - Session & data caching layer
  redis:
    image: redis:7-alpine
    container_name: mediconnect-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mediconnect-network
    restart: unless-stopped

  # Auth Service - Unified backend on port 5001
  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediconnect-auth-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5001
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-mediconnect}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-in-production}
      SERVICE_TYPE: auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5001:5001"
    networks:
      - mediconnect-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Chat Service - Unified backend on port 5002
  chat-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediconnect-chat-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5002
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-mediconnect}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-in-production}
      SERVICE_TYPE: chat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5002:5002"
    networks:
      - mediconnect-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Nginx Gateway - Reverse proxy & load balancer on port 8000
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile.nginx
    container_name: mediconnect-gateway
    depends_on:
      - auth-service
      - chat-service
    ports:
      - "8000:80"
    networks:
      - mediconnect-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # React Frontend - Client application on port 3000
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mediconnect-client
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - gateway
    ports:
      - "3000:3000"
    networks:
      - mediconnect-network
    restart: unless-stopped

  # Test Runner - Integration tests (optional profile)
  test-runner:
    build:
      context: ./services/test-runner
      dockerfile: Dockerfile
    container_name: mediconnect_test_runner
    environment:
      NODE_ENV: test
      API_URL: http://gateway
    depends_on:
      - gateway
      - auth-service
      - chat-service
    networks:
      - mediconnect-network
    restart: "no"
    profiles:
      - test

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mediconnect-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.19.0.0/16
